name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

env:
  PR_IMAGE_NAME: devops-githubactions:ci-scan

jobs:
  validate:
    name: Validate app
    runs-on: ubuntu-latest

    steps:
    - name: Check out repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "22"
        cache: "npm"
    
    - name: Install dependencies
      run: npm ci

    - name: Run npm audit
      run: npm audit --audit-level=high

    - name: Run ESLint
      run: npm run lint

    - name: Run tests
      run: npm test

    - name: Build app
      run: npm run build

  docker-security:
    name: Build and scan Docker image
    runs-on: ubuntu-latest
    needs: validate

    steps:
    - name: Check out repository
      uses: actions/checkout@v4

    - name: Log in to Docker Hub for Docker Scout
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build Docker image
      run: docker build -t ${{ env.PR_IMAGE_NAME }} .

    - name: Scan Docker image with Docker Scout
      uses: docker/scout-action@v1
      with:
        command: cves,recommendations
        image: local://${{ env.PR_IMAGE_NAME }}
        only-severities: critical,high
        exit-code: true
        write-comment: false